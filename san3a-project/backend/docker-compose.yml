version: "3.9"

# ────────────────────────────────────────────────────────────────
# Named network — isolates services so they can talk to each other
# by service name (e.g. "mongo") rather than by IP address
# ────────────────────────────────────────────────────────────────
networks:
  san3a-net:
    driver: bridge

# ────────────────────────────────────────────────────────────────
# Named volume — MongoDB data persists even after the container
# is stopped or removed
# ────────────────────────────────────────────────────────────────
volumes:
  mongo-data:

services:
  # ──────────────────────────────────────────────────────────────
  # MongoDB — local database (only used when you run docker-compose
  # locally; in production you use MongoDB Atlas via MONGO_URI)
  # ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0-jammy        # Official MongoDB image, pin to minor version
    container_name: san3a-mongo
    restart: unless-stopped       # Auto-restart on crash, but not on manual stop
    networks:
      - san3a-net
    volumes:
      - mongo-data:/data/db       # Persist data across container restarts
    environment:
      MONGO_INITDB_DATABASE: san3a
    # Expose port 27017 only to the host machine (not public internet)
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────────────────────
  # Backend — the Node.js/Express API
  # ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: .                  # Build from the backend directory
      dockerfile: Dockerfile
    container_name: san3a-backend
    restart: unless-stopped
    networks:
      - san3a-net
    ports:
      - "5000:5000"               # host:container — access at http://localhost:5000
    depends_on:
      mongo:
        condition: service_healthy  # Wait until MongoDB is actually ready
    environment:
      NODE_ENV: production
      PORT: 5000
      # ⚠️  For local dev with the mongo service above, use this URI:
      # MONGO_URI: mongodb://mongo:27017/san3a
      #
      # For production (MongoDB Atlas), inject the real URI at runtime:
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # Email config (Mailtrap or real SMTP)
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
    # Health-check so other services or orchestrators can see if the
    # API is actually responding (not just that the process is running)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
